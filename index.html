<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Xuân Store</title>
</head>

<body style="background:black;color:white;text-align:center">

<h1>🔥 XUÂN STORE 🔥</h1>
<p>Dịch vụ mạng xã hội - Nạp game - Locket Gold</p>
<style>
.services {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  background: #334155;
}

.price {
  color: #00ffcc;
  font-size: 18px;
  margin: 10px 0;
}

.card button {
  padding: 10px;
  width: 100%;
  background: #00ffcc;
  border: none;
  cursor: pointer;
}
</style>

<div class="services">

  <div class="card">
    <h3>Facebook</h3>
    <p>Tăng like, follow</p>
    <div class="price">50k - 200k</div>
    <button onclick="order()">Mua ngay</button>
  </div>

  <div class="card">
    <h3>TikTok</h3>
    <p>Tăng tim, view</p>
    <div class="price">30k - 150k</div>
    <button onclick="order()">Mua ngay</button>
  </div>

  <div class="card">
    <h3>Instagram</h3>
    <p>Tăng follow</p>
    <div class="price">40k - 180k</div>
    <button onclick="order()">Mua ngay</button>
  </div>

  <div class="card">
    <h3>Locket Gold</h3>
    <p>Nâng cấp nhanh</p>
    <div class="price">25k - 100k</div>
    <button onclick="order()">Mua ngay</button>
  </div>

</div>

<script>
function order() {
  window.location.href = "https://m.me/";
}
</script>
<button onclick="alert('Liên hệ qua Messenger nhé!')">
Đặt ngay
</button>

</body>
</html>
